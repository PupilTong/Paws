			shellPath = /bin/sh;
			shellScript = "set -e\n\n# Xcode strips the user PATH — ensure cargo is available.\nexport PATH=\"$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH\"\n\n# Resolve DEVELOPER_DIR dynamically so builds work regardless of Xcode\n# install location (Xcode.app, Xcode-beta.app, custom path, etc.).\n# Fall back to xcode-select if DEVELOPER_DIR is not already set by Xcode.\nif [ -z \"$DEVELOPER_DIR\" ]; then\n    export DEVELOPER_DIR=$(xcode-select -p 2>/dev/null || echo /Applications/Xcode.app/Contents/Developer)\nfi\n\nif [ \"$PLATFORM_NAME\" = \"iphonesimulator\" ]; then\n    export SDKROOT=$(xcrun --sdk iphonesimulator --show-sdk-path)\n    RUST_TARGET=\"aarch64-apple-ios-sim\"\nelse\n    export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)\n    RUST_TARGET=\"aarch64-apple-ios\"\nfi\n\nif [ \"$CONFIGURATION\" = \"Release\" ]; then\n    CARGO_FLAGS=\"--release\"\n    CARGO_PROFILE=\"release\"\nelse\n    CARGO_FLAGS=\"\"\n    CARGO_PROFILE=\"debug\"\nfi\n\nCARGO_TARGET_DIR=\"$SRCROOT/../target\"\ncd \"$SRCROOT/..\"\ncargo build --target \"$RUST_TARGET\" -p ios-renderer-backend $CARGO_FLAGS\n\n# Write the resolved library path so Xcode can find it without hardcoded search paths.\nmkdir -p \"$SRCROOT/../target/xcode\"\necho \"$CARGO_TARGET_DIR/$RUST_TARGET/$CARGO_PROFILE\" > \"$SRCROOT/../target/xcode/lib-path.txt\"\n\n# Build example WASM and inject it seamlessly as an Xcode resource payload\ncd \"$SRCROOT/../examples/example-styled-element\"\ncargo build --target wasm32-wasip2 $CARGO_FLAGS\ncp \"target/wasm32-wasip2/$CARGO_PROFILE/example_styled_element.wasm\" \"$SRCROOT/PawsExample/demo.wasm\"\n";
