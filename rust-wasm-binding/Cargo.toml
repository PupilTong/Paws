[package]
name = "rust-wasm-binding"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[features]
# Enables LLVM coverage instrumentation via minicov. Guest WASM modules
# compiled with this feature export `__paws_dump_coverage` /
# `__paws_coverage_ptr` so the host can extract profraw bytes after execution.
coverage = ["minicov"]

[dependencies]
view-macros = { path = "../view-macros" }
minicov = { version = "0.3", optional = true, default-features = false, features = ["alloc"] }
# wit-bindgen generates the guest-side import declarations that replace
# the old hand-written `#[link(wasm_import_module = "env")]` extern
# block. The `Guest` trait it emits is re-exported so example crates
# can implement `run` / `invoke-listener` and call `export!`.
wit-bindgen = "0.45"

[dev-dependencies]
rkyv = { version = "0.8.9" }
paws-style-ir = { path = "../paws-style-ir" }
