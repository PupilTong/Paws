name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Add wasm32 target
        run: rustup target add wasm32-wasip1

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate host code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      # -----------------------------------------------------------------
      # WASM guest coverage (minicov + llvm-tools-preview)
      # The project toolchain (rust-toolchain.toml = nightly-2026-04-07)
      # is used for the coverage build. We just need to ensure WASM
      # targets and llvm-tools-preview are installed on it.
      # -----------------------------------------------------------------
      - name: Install WASM target and llvm-tools for guest coverage
        run: |
          rustup target add wasm32-wasip1 --toolchain nightly-2026-04-07
          rustup component add llvm-tools-preview --toolchain nightly-2026-04-07

      - name: Run E2E tests with guest coverage extraction
        env:
          PAWS_WASM_COVERAGE: "1"
        run: cargo +nightly-2026-04-07 test -p wasmtime-engine --test e2e_examples --features wasm-coverage

      - name: Generate guest coverage report
        run: bash scripts/wasm-coverage.sh

      # Upload each lcov file under its own flag so host and guest coverage
      # are tracked independently in the Codecov dashboard. A single upload
      # call with multiple files+flags assigns ALL flags to ALL files.
      - name: Upload host coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: host
          fail_ci_if_error: true

      - name: Upload guest coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/wasm-coverage/guest-lcov.info
          flags: guest
          fail_ci_if_error: true

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build the benchmark target(s)
        run: cargo codspeed build

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
