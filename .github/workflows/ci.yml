name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install toolchain and system dependencies
        run: |
          rustup show
          sudo apt-get update
          sudo apt-get install -y libfontconfig-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-codspeed

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        # Scoped to Paws' own crates. Yew (vendored at `yew/packages/*`)
        # is a member of the workspace for testing, but it does not pass
        # Paws' `-D warnings` lint bar — keep lint enforcement on Paws
        # code only to avoid carrying a growing pile of upstream patches.
        run: |
          cargo clippy --all-targets --all-features \
            -p engine \
            -p wasmtime-engine \
            -p paws-runner \
            -p rust-wasm-binding \
            -p paws-style-ir \
            -p view-macros \
            -p ios-renderer-backend \
            -p paws-examples \
            -- -D warnings

      - name: Generate host code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      # -----------------------------------------------------------------
      # WASM guest coverage (minicov + llvm-tools-preview).
      # Guests are components (wasm32-wasip2); profraw bytes come out
      # through the component's `dump-coverage` export, plumbed through
      # `Runner::run_component_with_coverage` → `e2e_examples::write_profraw`.
      # -----------------------------------------------------------------
      - name: Run E2E tests with guest coverage extraction
        env:
          PAWS_WASM_COVERAGE: "1"
        run: cargo test -p wasmtime-engine --test e2e_examples --features wasm-coverage

      - name: Generate guest coverage report
        run: bash scripts/wasm-coverage.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info,target/wasm-coverage/guest-lcov.info
          flags: host,guest
          # Enumerate files inside submodules (yew/) so Codecov can match
          # coverage records under yew/packages/... against real files —
          # without this the git tree only sees a submodule pointer and
          # yew records get dropped during ingestion.
          recurse_submodules: true
          fail_ci_if_error: true

      - name: Build the benchmark target(s)
        run: cargo codspeed build

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
