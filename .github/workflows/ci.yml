name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Add wasm32 target
        # All Paws guests are component-model modules. `wasm32-wasip2` is
        # the single target; `wasm-component-ld` (installed below) wraps
        # LLVM's core-module output into a component.
        run: rustup target add wasm32-wasip2

      - name: Install wasm-component-ld
        run: cargo install wasm-component-ld --version "^0.5.22"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check -p engine -p wasmtime-engine -p paws-runner -p rust-wasm-binding -p paws-style-ir -p view-macros -p ios-renderer-backend

      # Strict clippy on Paws-owned crates only. The yew fork + its
      # example fixtures live in the same workspace (so `cargo test`
      # exercises yew's unit tests, per the Paws absorption) but we
      # don't gate Paws CI on upstream yew's clippy hygiene — yew's
      # own `clippy.yml` workflow is preserved at
      # `yew/.github/workflows.backup/clippy.yml` for reference.
      - name: Clippy (Paws crates only)
        run: cargo clippy
             -p engine -p wasmtime-engine -p paws-runner
             -p rust-wasm-binding -p paws-style-ir -p view-macros
             -p ios-renderer-backend
             --all-targets --all-features -- -D warnings

      # Full-workspace unit-test run. Includes yew's 46 unit tests
      # across `yew/packages/yew` — the point of absorbing yew's
      # workspace into Paws's. `--lib --tests` skips the 10 upstream
      # yew doctests that reference browser-only crates (`gloo`,
      # `web-sys`); those belong to yew's SSR/CSR story and aren't
      # meaningful under Paws's component-model wasi target.
      - name: Run workspace tests (Paws + yew unit tests)
        run: cargo test --workspace --lib --tests

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate host code coverage
        # Scope coverage to Paws crates (yew's tests still ran in the
        # previous step but we keep the Codecov `host` flag pointed
        # at Paws-owned code so coverage numbers aren't diluted by
        # yew's internals).
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info
             -p engine -p wasmtime-engine -p paws-runner
             -p rust-wasm-binding -p paws-style-ir -p view-macros
             -p ios-renderer-backend

      # -----------------------------------------------------------------
      # WASM guest coverage (minicov + llvm-tools-preview).
      # Guests are components (wasm32-wasip2); profraw bytes come out
      # through the component's `dump-coverage` export, plumbed through
      # `Runner::run_component_with_coverage` → `e2e_examples::write_profraw`.
      # -----------------------------------------------------------------
      - name: Install WASM target and llvm-tools for guest coverage
        run: |
          rustup target add wasm32-wasip2 --toolchain nightly-2026-04-07
          rustup component add llvm-tools-preview --toolchain nightly-2026-04-07

      - name: Run E2E tests with guest coverage extraction
        env:
          PAWS_WASM_COVERAGE: "1"
        run: cargo +nightly-2026-04-07 test -p wasmtime-engine --test e2e_examples --features wasm-coverage

      - name: Generate guest coverage report
        run: bash scripts/wasm-coverage.sh

      # Upload each lcov file under its own flag so host and guest
      # coverage are tracked independently in the Codecov dashboard.
      - name: Upload host coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: host
          fail_ci_if_error: true

      - name: Upload guest coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/wasm-coverage/guest-lcov.info
          flags: guest
          fail_ci_if_error: true

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build the benchmark target(s)
        run: cargo codspeed build

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
