name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Add wasm32 target
        # All Paws guests are component-model modules. `wasm32-wasip2` is
        # the single target; `wasm-component-ld` (installed below) wraps
        # LLVM's core-module output into a component.
        run: rustup target add wasm32-wasip2

      - name: Install wasm-component-ld
        run: cargo install wasm-component-ld --version "^0.5.22"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate host code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      # -----------------------------------------------------------------
      # WASM guest coverage is temporarily disabled during the
      # component-model migration. The previous pipeline relied on
      # `minicov` instrumenting the guest + `#[export_name]` exports
      # (`__paws_dump_coverage` / `__paws_coverage_ptr`) for the host
      # to probe. Under the component model those exports live inside
      # the wrapped core module, not at the component boundary, so the
      # old probe path no longer applies and `-Cinstrument-coverage`
      # fails to link (undefined `__llvm_profile_runtime` after
      # `minicov` was dropped from `rust-wasm-binding`). Re-enabling
      # guest coverage is tracked as follow-up work.
      # -----------------------------------------------------------------

      # Upload host coverage to Codecov. Guest coverage upload is
      # skipped until the component-model probe path is wired up.
      - name: Upload host coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: host
          fail_ci_if_error: true

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build the benchmark target(s)
        run: cargo codspeed build

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
