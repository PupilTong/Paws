name: iOS Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ios:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Add iOS simulator target
        run: rustup target add aarch64-apple-ios-sim

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Rust static library for iOS Simulator
        run: cargo build -p ios-renderer-backend --target aarch64-apple-ios-sim --release

      - name: Run Xcode tests
        # xcodebuild handles simulator selection and boot via the destination
        # spec. We pin the device name to avoid drift when runner images add
        # new models; OS=latest floats to the newest runtime the runner ships.
        # Tee the full log so build-phase errors (hidden by xcpretty) are
        # uploadable on failure.
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios-example-app/PawsExample.xcodeproj \
            -scheme PawsExample \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO \
            LIBRARY_SEARCH_PATHS="$(pwd)/target/aarch64-apple-ios-sim/release" \
            2>&1 | tee xcodebuild.log | xcpretty

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            TestResults
            xcodebuild.log
