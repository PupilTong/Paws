name: iOS Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ios:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Add iOS simulator target
        run: rustup target add aarch64-apple-ios-sim

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Rust static library for iOS Simulator
        run: cargo build -p ios-renderer-backend --target aarch64-apple-ios-sim --release

      - name: Create iOS simulator
        # macos-15 runner images vary in which simulators are preinstalled.
        # Create one explicitly from whatever iOS runtime + iPhone device
        # type the runner's Xcode has, so the destination lookup below can't
        # miss. UDID flows to the test step via GITHUB_ENV.
        run: |
          RUNTIME=$(xcrun simctl list runtimes available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          runtimes = [r for r in data['runtimes'] if r.get('isAvailable') and 'iOS' in r['name']]
          runtimes.sort(key=lambda r: r['version'], reverse=True)
          if not runtimes: sys.exit('no iOS runtimes available')
          print(runtimes[0]['identifier'])
          ")
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          types = [d for d in data['devicetypes'] if 'iPhone' in d['name']]
          if not types: sys.exit('no iPhone device types')
          print(types[0]['identifier'])
          ")
          SIM_UDID=$(xcrun simctl create "paws-ci-sim" "$DEVICE_TYPE" "$RUNTIME")
          echo "Using simulator $SIM_UDID (runtime=$RUNTIME, type=$DEVICE_TYPE)"
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"

      - name: Run Xcode tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios-example-app/PawsExample.xcodeproj \
            -scheme PawsExample \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO \
            LIBRARY_SEARCH_PATHS="$(pwd)/target/aarch64-apple-ios-sim/release" \
            2>&1 | tee xcodebuild.log | xcpretty

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            TestResults
            xcodebuild.log
