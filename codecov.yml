ignore:
  - "examples/**"
  # rust-wasm-binding guest coverage is now captured via minicov instrumentation
  # and reported separately (see scripts/wasm-coverage.sh).

flags:
  host:
    paths:
      - engine/
      - wasmtime-engine/
      - view-macros/
      - paws-style-ir/
  guest:
    paths:
      - rust-wasm-binding/
      - yew/
