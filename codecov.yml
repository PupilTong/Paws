coverage:
  status:
    project:
      default:
        # Allow up to 3% drop so adding new features (which add new
        # uncovered code paths) doesn't block the PR. Individual patches
        # still require good coverage via the `patch` check.
        target: auto
        threshold: 3%
    patch:
      default:
        # Patch coverage is informational (reports visible but non-blocking).
        # The host `cargo llvm-cov` run can't exercise coverage-pipeline
        # branches that require an instrumented WASM module (e.g. the
        # guest-memory read path in `extract_guest_coverage`) — those are
        # measured end-to-end in the separate `wasm-coverage` CI step, so
        # low host-patch coverage doesn't reflect actual untested code.
        informational: true

ignore:
  - "examples/**"
  # paws-wpt fixtures are WASM guest crates compiled standalone by
  # `paws-wpt/build.rs`. They live outside the cargo workspace (their
  # `[workspace]` table is empty), so `cargo llvm-cov --workspace`
  # never instruments or reports them. Listed explicitly so any
  # future stray records get dropped.
  - "paws-wpt/fixtures/**"
  # rust-wasm-binding guest coverage is captured via minicov instrumentation
  # and reported separately under the `guest` flag (see scripts/wasm-coverage.sh).

# Rewrite the absolute paths emitted by `llvm-cov export` (which embed the
# CI workspace prefix) to Paws-repo-relative paths so Codecov can match
# them against tracked files — including yew submodule sources under
# yew/packages/yew/src/.
fixes:
  - "/home/runner/work/Paws/Paws/::"

flags:
  host:
    paths:
      - engine/
      - wasmtime-engine/
      - view-macros/
      - paws-style-ir/
      # Engine-adjacent host crates that this repo's PRs commonly
      # touch. Without these listed, lcov records for them are still
      # uploaded but don't roll up under the `host` flag, so the
      # per-flag % stays artificially low when those crates grow.
      - paws-runner/
      - ios-renderer-backend/
      - paws-wpt/
      - yew/
    carryforward: true
  guest:
    paths:
      - rust-wasm-binding/
      - yew/
    carryforward: true
